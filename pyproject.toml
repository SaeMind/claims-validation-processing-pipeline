[tool.ruff]
line-length = 120
src = ["src", "cloud_functions", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.lint.isort]
known-first-party = ["src", "tests", "cloud_functions"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
ignore_missing_imports = true

# apache-beam ships no py.typed marker and has no inline type stubs, so mypy
# treats every beam.* symbol as effectively untyped. Under --strict this
# produces no-untyped-call, attr-defined, and name-defined errors that are
# about the third-party library's missing types, not bugs in this module.
# Disabling the relevant strict sub-checks here (and nowhere else) is the
# standard pattern for modules that wrap an inherently under-typed dependency.
[[tool.mypy.overrides]]
module = "src.dataflow_pipeline"
disallow_untyped_calls = false
disallow_untyped_defs = false
warn_return_any = false
implicit_reexport = true

[[tool.mypy.overrides]]
module = "apache_beam.*"
ignore_missing_imports = true
follow_imports = "skip"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term-missing --cov-fail-under=80"
